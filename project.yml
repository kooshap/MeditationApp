name: MeditationApp
options:
  bundleIdPrefix: com.meditation
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  MeditationApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MeditationApp
        excludes:
          - "**/*.md"
          - Resources/.gitkeep
    info:
      path: MeditationApp/Info.plist
      properties:
        CFBundleDisplayName: Meditate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        NSUserNotificationsUsageDescription: "Rings the ending bell when your session completes while the app is in the background."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meditation.app
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: YES
